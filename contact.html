<div class="panel-tab" id="panel-tab" onclick="openPanel()">
<span class="panel-tab-icon">♪</span>
<span class="panel-tab-text">聲音</span>
</div>
<aside class="sound-panel" id="sound-panel" aria-label="聲音控制面板">
<button class="panel-close" onclick="closePanel()">✕</button>
<div class="panel-header">
<p class="panel-title">環境音效</p>
<p class="panel-subtitle">音樂盒 · Music Box</p>
</div>
<div class="now-playing" id="now-playing">
<div class="np-dot"></div>
<span class="np-text" id="np-text"></span>
</div>
<div class="panel-section">
<p class="panel-section-label">背景音樂</p>
<div id="music-list"></div>
<button class="play-btn" id="play-btn" onclick="togglePlay()">
<span id="play-icon">▶</span>
<span id="play-label">播放音樂</span>
</button>
<div class="slider-group">
<div class="slider-label-row">
<span class="slider-name">音樂音量</span>
<span class="slider-value" id="music-vol-val">60%</span>
</div>
<input type="range" class="panel-range" min="0" max="100" value="60" oninput="updateSlider(this,'music-vol-val')">
</div>
</div>
<div class="panel-section">
<p class="panel-section-label">環境氛圍</p>
<button class="ambient-btn" id="btn-rain" onclick="toggleAmbient('rain',this)">
<span class="ambient-icon">🌧</span>
<span class="ambient-label">雨聲</span>
<span class="ambient-tag" id="tag-rain">關閉</span>
</button>
<div class="ambient-slider-section" id="section-rain">
<div id="rain-list" style="padding:.2rem .5rem .4rem;"></div>
<div class="slider-group" style="padding:.2rem .75rem .6rem;">
<div class="slider-label-row">
<span class="slider-name" style="font-size:.68rem;">雨聲音量</span>
<span class="slider-value" id="rain-vol-val">50%</span>
</div>
<input type="range" class="panel-range" min="0" max="100" value="50" oninput="updateSlider(this,'rain-vol-val')">
</div>
</div>
<button class="ambient-btn" id="btn-white" onclick="toggleAmbient('white',this)">
<span class="ambient-icon">🌊</span>
<span class="ambient-label">白噪音</span>
<span class="ambient-tag" id="tag-white">關閉</span>
</button>
<div class="ambient-slider-section" id="section-white">
<div class="slider-group" style="padding:.2rem .75rem .6rem;">
<div class="slider-label-row">
<span class="slider-name" style="font-size:.68rem;">白噪音音量</span>
<span class="slider-value" id="white-vol-val">40%</span>
</div>
<input type="range" class="panel-range" min="0" max="100" value="40" oninput="updateSlider(this,'white-vol-val')">
</div>
</div>
<button class="ambient-btn" id="btn-fire" onclick="toggleAmbient('fire',this)">
<span class="ambient-icon">🕯</span>
<span class="ambient-label">壁爐火聲</span>
<span class="ambient-tag" id="tag-fire">關閉</span>
</button>
<div class="ambient-slider-section" id="section-fire">
<div class="slider-group" style="padding:.2rem .75rem .6rem;">
<div class="slider-label-row">
<span class="slider-name" style="font-size:.68rem;">火聲音量</span>
<span class="slider-value" id="fire-vol-val">35%</span>
</div>
<input type="range" class="panel-range" min="0" max="100" value="35" oninput="updateSlider(this,'fire-vol-val')">
</div>
</div>
