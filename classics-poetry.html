<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>詩詞裡的心靈風景｜讀古人，懂自己｜The Quiet Light · 靜謐之光</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">
<style>

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth; background:#141d29;}
  body{
    background-color:#e9e2d0;
    color:#3a3226;
    font-family:"Noto Serif TC", serif;
    line-height:1.9;
    overflow-x:hidden;
  }
  .page-bg{
    position:fixed; inset:0; z-index:0;
    background-size:cover;
    background-position:center 38%;
  }
  .page-bg::after{
    content:"";
    position:absolute; inset:0;
    background:rgba(20,17,13,0.16);
  }
  .page-content{
    position:relative; z-index:1;
  }
  a{color:inherit; text-decoration:none;}

  header.site-nav{
    position:absolute; top:0; left:0; right:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:28px 6vw;
  }
  header.site-nav .brand{
    font-family:"LXGW WenKai TC","Noto Serif TC",serif;
    font-size:1.05rem; letter-spacing:0.08em; color:#f4efe2;
  }
  header.site-nav nav a{
    margin-left:2rem; font-size:0.92rem; letter-spacing:0.08em;
    color:#c3cdd6;
  }
  header.site-nav nav a.active{color:#f2c383;}

  .hero{
    position:relative;
    height:100vh; min-height:640px; max-height:1000px;
    display:flex; align-items:flex-end; justify-content:center;
    overflow:hidden;
    background-color:#141d29;
  }
  .hero-bg{
    position:absolute; inset:-6%;
    overflow:hidden;
  }
  .hero-bg-layer, .page-bg{
    background-image:url("hero-willow.jpg");
  }
  .hero-bg-layer{
    position:absolute; inset:0;
    background-size:cover;
    background-position:center 32%;
    filter:saturate(0.92) brightness(0.82) contrast(1.03);
    animation:kenburns 42s ease-in-out infinite alternate;
  }
  @keyframes kenburns{
    0%{ transform:scale(1) translate(0,0); }
    100%{ transform:scale(1.14) translate(-2.2%,-1.4%); }
  }
  .hero-overlay{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(15,20,28,0.6) 0%, rgba(15,20,28,0.12) 32%, rgba(15,20,28,0.2) 55%, rgba(15,20,28,0.82) 100%),
      linear-gradient(90deg, rgba(15,20,28,0.35) 0%, rgba(15,20,28,0) 22%, rgba(15,20,28,0) 78%, rgba(15,20,28,0.35) 100%);
  }
  .hero-sparkle{
    position:absolute; inset:0; width:100%; height:100%; display:block;
    mix-blend-mode:screen; opacity:0.75;
  }
  @media (prefers-reduced-motion: reduce){
    .hero-bg-layer{ animation:none; }
  }
  .hero-copy{
    position:relative; z-index:5;
    text-align:center;
    padding-bottom:9vh;
    max-width:640px;
    padding-left:1.2rem; padding-right:1.2rem;
  }
  .hero-eyebrow{
    font-size:0.82rem; letter-spacing:0.4em; color:#f2c383;
    margin-bottom:1.1rem;
    text-shadow:0 2px 12px rgba(0,0,0,0.5);
  }
  .hero h1{
    font-family:"LXGW WenKai TC","Noto Serif TC",serif;
    font-weight:700;
    font-size:40px;
    color:#f4efe2;
    letter-spacing:0.1em;
    text-shadow:0 2px 20px rgba(0,0,0,0.55), 0 1px 3px rgba(0,0,0,0.4);
  }
  .hero p.sub{
    margin-top:1.1rem;
    font-size:16px;
    color:#e6ded0;
    letter-spacing:0.06em;
    text-shadow:0 2px 14px rgba(0,0,0,0.5);
  }

  .category-nav{
    display:flex; flex-wrap:wrap; justify-content:center; gap:0.9rem;
    max-width:720px; margin:5vh auto 0;
    padding:0 6vw;
  }
  .category-nav a{
    font-size:0.86rem; letter-spacing:0.14em;
    color:#3a3226; font-weight:600;
    padding:0.7rem 1.4rem;
    background:rgba(247,242,230,0.66);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border:1px solid rgba(255,255,255,0.55);
    border-radius:999px;
    box-shadow:0 10px 26px rgba(60,45,25,0.14);
    transition:background .3s ease, transform .3s ease;
  }
  .category-nav a:hover{
    background:rgba(247,242,230,0.88);
    transform:translateY(-2px);
  }

  .essay-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
    gap:1.4rem;
  }
  .view-all{
    display:inline-flex; align-items:center; gap:.5rem;
    margin:0.4rem 0 0.6rem;
    font-size:0.9rem; letter-spacing:0.1em; color:#a5622a; font-weight:600;
  }

  .intro{
    max-width:720px; margin:0 auto;
    padding:2.8rem 2.2rem;
    margin-top:4vh; margin-bottom:6vh;
    text-align:center;
    background:rgba(247,242,230,0.8);
    backdrop-filter:blur(26px) saturate(150%);
    -webkit-backdrop-filter:blur(26px) saturate(150%);
    border:1px solid rgba(255,255,255,0.5);
    border-top-color:rgba(255,255,255,0.75);
    border-radius:20px;
    box-shadow:0 24px 50px rgba(60,45,25,0.18), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .intro .label{
    font-size:0.8rem; letter-spacing:0.4em; color:#a5622a;
    font-weight:700;
    margin-bottom:1.4rem;
  }
  .intro p{
    font-size:1.02rem; color:#4a4030; letter-spacing:0.02em;
  }
  .intro p + p{ margin-top:1rem; }

  .essays{
    max-width:1180px; margin:0 auto;
    padding:5vh 6vw 14vh;
    display:flex; flex-direction:column; gap:1.6rem;
  }
  .group-title{
    font-family:"LXGW WenKai TC","Noto Serif TC",serif;
    font-size:1.55rem;
    font-weight:700;
    letter-spacing:0.16em;
    color:#2e2417;
    text-shadow:0 1px 10px rgba(255,255,255,0.7), 0 1px 3px rgba(255,255,255,0.5);
    margin:2.2rem 0 -0.4rem;
    padding-left:0.2rem;
    scroll-margin-top:110px;
  }
  .group-title:first-child{ margin-top:0.4rem; }
  .group-title::after{
    content:"";
    display:block;
    width:36px; height:2px;
    margin-top:0.7rem;
    background:#b5763a;
    opacity:0.7;
  }
  .essay-card{
    position:relative;
    padding:2.6rem 2.2rem;
    background:rgba(247,242,230,0.8);
    backdrop-filter:blur(26px) saturate(150%);
    -webkit-backdrop-filter:blur(26px) saturate(150%);
    border:1px solid rgba(255,255,255,0.5);
    border-top-color:rgba(255,255,255,0.75);
    border-radius:20px;
    box-shadow:0 24px 50px rgba(60,45,25,0.16), inset 0 1px 0 rgba(255,255,255,0.5);
  }

  .essay-callback{
    font-size:0.78rem; letter-spacing:0.3em; color:#5c6b52;
    font-weight:700;
    margin-bottom:0.9rem;
  }
  .essay-title{
    font-family:"LXGW WenKai TC","Noto Serif TC",serif;
    font-size:28px;
    color:#2e2417;
    font-weight:700;
    letter-spacing:0.06em;
  }
  .essay-quote{
    margin-top:1rem;
    padding-left:1.1rem;
    border-left:2px solid #b5763a;
    font-size:0.95rem;
    color:#6b5f4d;
    letter-spacing:0.04em;
  }
  .essay-desc{
    margin-top:1.1rem;
    font-size:0.98rem;
    color:#4a4030;
    max-width:56ch;
  }
  .essay-link{
    display:inline-flex; align-items:center; gap:.5rem;
    margin-top:1.4rem;
    font-size:0.9rem; letter-spacing:0.08em; color:#a5622a;
    border-bottom:1px solid rgba(165,98,42,0.4);
    padding-bottom:2px;
  }

  .essay-card.upcoming{ opacity:.68; }
  .essay-card.upcoming .essay-link{
    color:#9c917d; border-color:transparent;
  }

  footer.site-footer{
    text-align:center;
    padding:4vh 6vw 6vh;
    font-size:0.82rem; color:#5c5240;
    text-shadow:0 1px 6px rgba(255,255,255,0.4);
  }

  .reveal{ opacity:1; transform:none; }
  html.js-ready .reveal{
    opacity:0; transform:translateY(24px);
    transition:opacity .9s ease, transform .9s ease;
  }
  html.js-ready .reveal.in-view{ opacity:1; transform:translateY(0); }

  @media (min-width:640px){
    .hero h1{ font-size:56px; }
    .hero p.sub{ font-size:19px; }
    .essay-title{ font-size:32px; }
  }

  @media (max-width:640px){
    header.site-nav{ padding:20px 5vw; flex-direction:column; align-items:flex-start; gap:.6rem; }
    header.site-nav nav a{ margin-left:0; margin-right:1.4rem; }
    .hero-copy{ padding-bottom:7vh; }
  }

  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .intro, .essay-card{ background:rgba(240,233,216,0.95); }
  }

  .page-header{
    position:relative;
    padding:150px 6vw 6vh;
    overflow:hidden;
  }
  .page-header::before{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(15,20,28,0.62) 0%, rgba(15,20,28,0.28) 55%, rgba(15,20,28,0) 100%);
    pointer-events:none;
  }
  .page-header-inner{
    position:relative; max-width:820px;
  }
  .back-link{
    display:inline-flex; align-items:center; gap:.4rem;
    font-size:0.85rem; letter-spacing:0.06em; color:#e6ded0; font-weight:600;
    text-shadow:0 2px 12px rgba(0,0,0,0.5);
    margin-bottom:1.6rem;
  }
  .page-header-eyebrow{
    font-size:0.8rem; letter-spacing:0.35em; color:#f2c383; font-weight:700;
    text-shadow:0 2px 12px rgba(0,0,0,0.5);
    margin-bottom:0.9rem;
  }
  .page-header-title{
    font-family:"LXGW WenKai TC","Noto Serif TC",serif;
    font-size:2.1rem; font-weight:700; color:#f4efe2;
    letter-spacing:0.06em;
    text-shadow:0 2px 20px rgba(0,0,0,0.55), 0 1px 3px rgba(0,0,0,0.4);
  }
  .page-header-sub{
    margin-top:0.9rem; font-size:1rem; color:#e6ded0;
    text-shadow:0 2px 14px rgba(0,0,0,0.5);
    max-width:60ch;
  }
  @media (min-width:640px){
    .page-header-title{ font-size:2.6rem; }
    .page-header{ padding:170px 6vw 7vh; }
  }

</style>
</head>
<body>

<div class="page-bg"></div>

<div class="page-content">
<header class="site-nav">
  <div class="brand">The Quiet Light · 靜謐之光</div>
  <nav>
    <a href="index.html">首頁</a>
    <a href="stories.html">故事集</a>
    <a href="classics.html" class="active">讀古人</a>
    <a href="about.html">關於</a>
    <a href="contact.html">聯絡</a>
  </nav>
</header>

<section class="page-header">
  <div class="page-header-inner">
    <a class="back-link" href="classics.html">← 讀古人，懂自己</a>
    <h1 class="page-header-title">詩詞裡的心靈風景</h1>
    <p class="page-header-sub">借古典詩詞的意象，看見細膩情緒裡的自己。</p>
  </div>
</section>

<section class="essays">
  <div class="essay-grid">
    <article class="essay-card reveal upcoming">
      <div class="essay-callback">詩詞裡的心靈風景・之一</div>
      <h2 class="essay-title">聲聲慢</h2>
      <p class="essay-quote">「尋尋覓覓，冷冷清清，淒淒慘慘戚戚。」</p>
      <p class="essay-desc">李清照的疊字裡，藏著情緒粒度的細膩——即將發布，敬請期待。</p>
      <span class="essay-link">敬請期待</span>
    </article>
  </div>
</section>

<footer class="site-footer">
  © The Quiet Light · 所有故事版權歸作者所有
</footer>

</div>

<script>
  document.documentElement.classList.add('js-ready');
  var cards = document.querySelectorAll('.reveal');
  if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('in-view');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    cards.forEach(function(c){ io.observe(c); });
  } else {
    cards.forEach(function(c){ c.classList.add('in-view'); });
  }
</script>

</body>
</html>
