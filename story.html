<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">故事 · The Quiet Light 靜謐之光</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="favicon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lato:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<canvas id="canvas"></canvas>
<div class="site-wrapper">
<nav>
<a class="nav-brand" href="index.html">
<h1>The Quiet Light<span class="nav-brand-zh">· 靜謐之光</span></h1>
<span>短篇故事館 · Short Story Collection</span>
</a>
<div class="nav-links">
<a href="index.html" data-page="home">首頁</a>
<a href="stories.html" data-page="stories">故事集</a>
<a href="classics.html" data-page="classics">讀古人</a>  
<a href="about.html" data-page="about">關於</a>
<a href="contact.html" data-page="contact">聯絡</a>
</div>
</nav>
<main class="reader-page" id="reader-main">
<a href="stories.html" class="back-link">← 回到故事集</a>
<p class="reader-tag" id="r-tag"></p>
<h1 class="reader-title" id="r-title"></h1>
<p class="reader-date" id="r-date"></p>
<div class="reader-hr"></div>
<div class="reader-body" id="r-body"></div>
</main>
<footer>
<p class="footer-copy">© The Quiet Light · 所有故事版權歸作者所有</p>
</footer>
</div>
<div class="panel-tab" id="panel-tab" onclick="openPanel()">
<span class="panel-tab-icon">♪</span>
<span class="panel-tab-text">聲音</span>
</div>
<aside class="sound-panel" id="sound-panel" aria-label="聲音控制面板">
<button class="panel-close" onclick="closePanel()">✕</button>
<div class="panel-header">
<p class="panel-title">環境音效</p>
<p class="panel-subtitle">音樂盒 · Music Box</p>
</div>
<div class="now-playing" id="now-playing">
<div class="np-dot"></div>
<span class="np-text" id="np-text"></span>
</div>
<div class="panel-section">
<p class="panel-section-label">背景音樂</p>
<div id="music-list"></div>
<button class="play-btn" id="play-btn" onclick="togglePlay()">
<span id="play-icon">▶</span>
<span id="play-label">播放音樂</span>
</button>
<div class="slider-group">
<div class="slider-label-row">
<span class="slider-name">音樂音量</span>
<span class="slider-value" id="music-vol-val">60%</span>
</div>
<input type="range" class="panel-range" min="0" max="100" value="60" oninput="updateSlider(this,'music-vol-val')">
</div>
</div>
<div class="panel-section">
<p class="panel-section-label">環境氛圍</p>
<button class="ambient-btn" id="btn-rain" onclick="toggleAmbient('rain',this)">
<span class="ambient-icon">🌧</span>
<span class="ambient-label">雨聲</span>
<span class="ambient-tag" id="tag-rain">關閉</span>
</button>
<div class="ambient-slider-section" id="section-rain">
<div id="rain-list" style="padding:.2rem .5rem .4rem;"></div>
<div class="slider-group" style="padding:.2rem .75rem .6rem;">
<div class="slider-label-row">
<span class="slider-name" style="font-size:.68rem;">雨聲音量</span>
<span class="slider-value" id="rain-vol-val">50%</span>
</div>
<input type="range" class="panel-range" min="0" max="100" value="50" oninput="updateSlider(this,'rain-vol-val')">
</div>
</div>
<button class="ambient-btn" id="btn-white" onclick="toggleAmbient('white',this)">
<span class="ambient-icon">🌊</span>
<span class="ambient-label">白噪音</span>
<span class="ambient-tag" id="tag-white">關閉</span>
</button>
<div class="ambient-slider-section" id="section-white">
<div class="slider-group" style="padding:.2rem .75rem .6rem;">
<div class="slider-label-row">
<span class="slider-name" style="font-size:.68rem;">白噪音音量</span>
<span class="slider-value" id="white-vol-val">40%</span>
</div>
<input type="range" class="panel-range" min="0" max="100" value="40" oninput="updateSlider(this,'white-vol-val')">
</div>
</div>
<button class="ambient-btn" id="btn-fire" onclick="toggleAmbient('fire',this)">
<span class="ambient-icon">🕯</span>
<span class="ambient-label">壁爐火聲</span>
<span class="ambient-tag" id="tag-fire">關閉</span>
</button>
<div class="ambient-slider-section" id="section-fire">
<div class="slider-group" style="padding:.2rem .75rem .6rem;">
<div class="slider-label-row">
<span class="slider-name" style="font-size:.68rem;">火聲音量</span>
<span class="slider-value" id="fire-vol-val">35%</span>
</div>
<input type="range" class="panel-range" min="0" max="100" value="35" oninput="updateSlider(this,'fire-vol-val')">
</div>
</div>
</div>
<div class="panel-footer">
<p class="panel-footer-text">所有音樂為免費授權作品<br>適合深夜靜讀使用</p>
</div>
</aside>
<div class="toast" id="toast"></div>
<script src="stories-data.js"></script>
<script src="script.js"></script>
<script>
setActiveNav('stories');
const params = new URLSearchParams(window.location.search);
const storyId = params.get('id');
const story = STORIES.find(s => s.id === storyId);
if (story) {
  document.getElementById('page-title').textContent = story.title + ' · The Quiet Light 靜謐之光';
  document.getElementById('r-tag').textContent = story.date;
  document.getElementById('r-title').textContent = story.title;
  document.getElementById('r-date').innerHTML = story.titleEn
    ? `<span style="font-style:italic;font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3.5vw,2.4rem);font-weight:300;color:rgba(251,246,238,0.75);display:block;margin-top:.2rem;">${story.titleEn}</span>`
    : '';
  document.getElementById('r-body').innerHTML = story.body;
} else {
  document.getElementById('reader-main').innerHTML = `
    <a href="stories.html" class="back-link">← 回到故事集</a>
    <h1 class="reader-title">找不到這個故事</h1>
    <p class="page-body" style="margin-top:1rem;">這篇故事可能已經被移除，或連結有誤。</p>
  `;
}
</script>
</body>
</html>
